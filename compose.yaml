services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: camel
      POSTGRES_USER: camel
      POSTGRES_PASSWORD: camel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  portfolio-manager:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-camel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-camel}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-camel}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}

      APCA_API_KEY_ID: ${ALPACA_API_KEY_ID:-}
      APCA_API_SECRET_KEY: ${ALPACA_API_SECRET_KEY:-}
      ALPACA_MARKETDATA_URL: ${ALPACA_MARKETDATA_URL:-https://data.alpaca.markets}
    entrypoint: ["/usr/local/bin/portfolio-manager"]
    command: ["--help"]

volumes:
  pgdata: {}